name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel older CI runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          # Build doesn't call Claude, but next.js build imports server modules
          # that read process.env. A placeholder keeps the SDK import quiet.
          ANTHROPIC_API_KEY: 'sk-ant-placeholder-for-build-only'
